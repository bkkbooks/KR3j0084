body:
  text: 尚書故實雜家類三雜説之屬提要臣等謹案尚書故實一卷唐李綽撰綽仕履未詳考新唐書宰相世系表趙郡李氏南祖之後有名綽字肩孟者為史部侍郎紓之曾孫書中自稱趙郡人或即其人歟宋史藝文志凡兩載之一見史部傳記類一見子部小説類而注其下云綽一作緯實一作事今按曾慥類說所引亦明標李綽之名則作緯者悞矣自序稱賔䕶尚書張公三相盛門博物多聞綽避難圃田每容侍話凡聆徴引必異尋常遂纂集尤異作此書葢皆據張尚書之所述也惟張尚書不著其名新唐書藝文志沿崇文總目之訛以張尚書為即延賞晁公武陳振孫己斥其悞然書中稱嘉貞為四世祖又稱嘉祐為髙伯祖則所謂張尚書者當在彦逺天保彦修曼容諸兄弟中其文規次宗乃宏靖子於嘉貞為曾孫不可稱髙祖振孫乃皆以其不登八座為疑亦非也觀其言賓䕶移知廣陵又言公除潞州旌節則必嘗為揚州刺史昭義節度使者當以史于天保諸人下畧其官位遂致無可考耳其書雜記近事亦兼考舊聞如司馬承禎王谷盧元公尉遲迥韋卿材謝真人淪落衣冠章仇兼瓊郭承嘏諸條雖頗渉語怪然如蘭亭敘入昭陵顧長康畫清夜遊西園圗謝赫李嗣真評畫百衲琴載顒刻佛像碧落碑狸骨帖寶章集靈芝殿佛教屬鬼宿昌黎生改金根車謝安無字碑鄭三絶顧况工畫諸軼事皆出此書而墓碑有圓空徳政碑不當有圓空一條揚子華畫牡丹花己見北齊一條晉書寒具一條省試鶯出谷詩一條杜牧未為比部一條王右軍書千字文一條尤頗有考証王㮊野客叢書引據最為博洽而牡丹引揚子華事天厨引西園圖事又引其東方朔一條証山海經事皆據為出典在唐人小説中亦因話録之亞也惟張宏靖蕭齋記本為李約作原記尚存而云蕭齋在張氏東都舊第李商隠僅兩任校書郎一任太學博士本傳可考而云臺儀自大夫以下至監察通謂之五院御史唐國厯五院者惟李商隠張延賞温造三人皆為失實要之瑕不掩瑜固不以一二小節廢矣乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f2cb4dde8be5d97d81f4d3c1347edc49d364010f77cb1a3ba37e6c6be637ea50
