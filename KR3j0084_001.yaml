body:
  text: 尚書故實唐李綽撰賔護尚書河東張公三相盛門四朝雅望博物自同於壯武多聞逺邁於咠臣綽避難圃田寓居佛廟秩有同於錐印迹更甚於酒傭叨遂迎塵每容侍話凡聆徴引必異尋常足廣後生可貽好事遂纂集尤異者兼雜以詼諧十數節作尚書故實云耳髙祖太武皇帝本名與文皇帝同上一字後乃刪去嘗有碑版鑿處具在太武是陵廟中玉册定神堯乃母后追尊顔公曽抗疏極論為袁傪所沮而寢太宗酷好法書有大王真迹三千六百紙率以一丈二尺為一軸寶惜者獨蘭亭為最置於座側朝夕觀覽嘗一日附耳語髙宗曰吾千秋萬嵗後與吾蘭亭將去也及奉諱之曰用玉匣貯之藏於昭陵天册府弧矢尺度蓋倍於常者太宗北逐劉黑闥為突厥所窘遂親發箭射退賊騎突厥中得此箭傳觀皆歎伏神異後餘弓一張箭五枝藏在武庫歷代一作朝郊丘重禮必陳於儀衛之前以耀武德惜哉今與法物同為煨燼矣然此即劉氏斬蛇劒之比也豈不有所歸乎司馬天師名承禎字紫微形狀類陶隱居玄宗謂人曰承禎𢎞景後身也天降車上有字曰賜司馬承禎尸解去日白鶴一作雲滿庭異香郁烈承禎號白雲先生故人謂車為白雲車至文宗朝并張騫海槎同取入內有李幼竒者開元中以藝干柳芳嘗對芳念百韻詩芳已暗記便題之于壁不差一字謂幼竒曰此吾之詩也幼竒大驚異之有不平色久之徐曰聊相戲此君所念詩也因請幼竒更誦所著文章皆一遍便能寫録又説漢武帝時嘗有外域獻獨足鶴人皆不知以為怪異東方朔奏曰此山海經所謂畢方鳥也驗之果是因敕廷臣皆習山海經山海經伯翳著劉向編次作序伯翳亦曰伯益書曰益典朕虞蓋隨禹治水撮山海之異遂成書郭𢎞農注解鄭廣文作聖善寺報慈閣大像記云自頂至頤八十三尺額珠以銀鑄成虛中盛八石搆聖善寺佛殿僧惠範以罪沒入其財得一千三百萬貫元載破家籍財貨諸物得胡椒九百石盧元公好道重方士有王谷者得黃白術變瓦礫泥土立成黃金賔護時在相國大梁幕中皆目覩之谷一日死於淮隂賔護見范陽公敘言公曰王十五兄不死後果有人於湘潭間見之已變姓名矣賔護既徙知廣陵常亦話於崔魏公公因説他日有王修能變竹葉為黃金某所目擊也進士盧融嘗説盧元公鎮南海日疽發於鬢氣息惙然有一少年道士直來牀前謂相國曰本師知尚書病瘡遣某將少膏藥來可便傅之相國寵姬韓氏遂取膏藥疾貼於瘡上至暮而效數日平復於倉皇之際不知道士所來及令勘中門至衙門十數重並無出入處方知其異也盛膏小銀合子韓氏收得後猶在融即相國親密目驗其事因附於此公自言四世祖河東公為中書令著緋綽安邑宅中曽有河東公任中書令著緋真又説傅遊藝居相位著緑李師誨者畫蕃馬李漸之孫也為劉從諫潞州從事知劉不軌遂隱居黎城山潞州平朝廷嘉之就除一縣宰曽於衲僧處得落星石一片僧云於蜀路早行見星墜於前遂圍數尺掘之得片石如斷磬其一端有雕刻狻猊之首亦如磬有孔穿絛處尚光滑豈天上樂器毁而墜歟此石後流轉到綽安邑宅中清夜遊西園圖顧長康畫有梁朝諸王跋尾處云圖上若干人並食天厨語出諸子書檢尋未得貞觀中禇河南裝背題處具在本張維素家收得維素從申之子傳至相國張公𢎞靖元和中準宣索并鍾元常寫道德經同進入內時張公鎮并州進圖表李太尉衛公作也後中貴人崔潭峻自禁中將出復流傳人間維素子周封前涇州從事在京一日將此圖求售周封驚異之遽以絹數匹贖得經年忽聞欵關甚急問之見數人同稱仇中尉傳語評事知清夜圖在宅計間居家貧請以絹三百匹易之周封憚其迫脅遽以圖授明日果賫絹至後方知詐偽乃是一力足人求江淮大鹽院時王庶人涯判鹽鐵酷好書畫謂此人曰為余訪得此圖然遂公所請因為計取耳及十二家起復落在一粉鋪內郭侍郎承嘏閽者以錢三百買得獻郭郭公又流傳至令狐家宣宗嘗問相國有何名畫相國具以圖對復進入內賔護親見相國説公嘗於貴人家見梁昭明太子腦骨微紅而潤澤抑異於常也又嘗見人臘長尺許眉目手足悉具或以為僬僥人也又説表弟盧某一日碧空澄徹仰見仙人乘鶴而過别有數鶴飛在前後適覩自一鶴背遷一鶴背亦如人換馬之狀國朝李嗣真評事云顧畫屈居第一然虎頭又伏衛協畫北風圖北風圖毛詩義公平康里宅乃崔司業融舊第有司業題壁處猶在蜀王嘗造千面琴散在人間蜀王即隋文之子楊秀也又李汧公取桐孫之精者雜綴為之謂之百納琴用蝸殼為徽其間三面尤絶異通謂之響泉韻磬絃一上可十年不斷兵部李員外約言汧公之子也識度清曠迥出塵表與主客張員外諗同棄官并韋徵君况牆東遁世不婚娶不治生業李尤厚於張每與張匡牀靜言達旦不寢人莫得知贈張詩曰我有心中事不向韋二説秋夜洛陽城明月照張八諗即尚書公之羣從佛像本胡夷朴陋人不生敬今之藻繪雕刻自戴顒始也顒嘗刻一像自隱帳中聽人臧否隨而改之如是者積十年厥功方就絳州碧落碑文乃髙祖子韓王元嘉四男為先妃所製陳惟玉書今不知者妄有指説非也荀輿能書嘗寫狸骨治勞方右軍臨之至今謂之狸骨帖古碑皆有圓空音孔蓋碑者悲本也墟墓間物每一墓有四焉初葬穿繩於空以下棺乃古懸窆之禮禮曰公室視豐碑三家視桓楹人因就紀其德由是遂有碑表數十年前有樹德政碑亦設圓空不知根本甚失後有悟之者遂改焉公自述髙伯祖嘉祐開元中為相州都督廨宇有災異郡守物故者連纍政將軍嘉祐終金吾將軍至則於正寢整衣冠通夕而坐夜分忽肅屛間聞歎息聲俄有人自西廡而出衣巾藍縷形形憔悴歷階而上直至于前將軍因厲聲問曰是何神祇來至于此答曰余後周將尉遲回也死於此地遺骸尚存願託有心得畢葬祭前牧守者皆膽薄氣劣驚悸而終非余所害又指一十餘嵗女子曰此余之女也同瘞廡下明日將軍召吏發掘果得二骸備衣衾棺器禮而葬之越二夕復出感謝因曰余無他能報效願禆公政節宣水旱唯所命焉將軍遂以事上聞請置廟嵗時血食上特降書詔褒異勒碑敘述今相州碑廟見在中書令河東公開元中居相位有張憬藏者能言休咎一日忽詣公以一幅紙大書台字授公公曰余見居台司此何意也後數日貶官台州刺史河東公鎮并州上問有何事第言之奏曰臣有弟嘉祐逺牧方州手足支離常繫念慮上因口敕張嘉祐可欣州刺史河東屬郡上意不疑張亦不讓豈非至公無隱出於常限者乎王平南廙右軍之叔也善書畫常謂右軍吾諸事不足法惟書畫可法晉明帝師其畫王右軍學其書焉宣平太傅相國盧公應舉時寄居夀州安豐縣别墅嘗遊芍陂芍字今呼為鵲革下芍藥之芍按魏志是芍音著多見里人負薪者持碧蓮花一朵已傷器刃矣云陂中得之盧公後從事浙西因使淮服話於太尉衛公公令搜訪芍陂則無有矣又遍尋於江渚間亦終不能得乃知向者一朵蓋神異耳京國頃嵗街陌中有聚觀戲場者詢之乃二刺蝟對打令既合節奏又中章程座中有前將作李少監韞亦云曽見京城佛寺率非真僧曲檻回廊户牖重復有一僧室當門有匱扃鎖甚牢竊知者云自匱而入則别有幽房邃閣詰曲深嚴囊槖姦回何所不有牛相公僧孺鎮襄州日以久旱祈禱無應有處士不記名姓衆云豢龍者公請致雨處士曰江漢間無龍獨一湫泊中有之黑龍也強驅逐必慮為災難制公固命之果有大雨漢水泛漲漂溺萬户處士懼罪亦亡去十年前有人他處見猶在汲冡書蓋魏安釐王冡晉時衛郡汲縣耕人於古冡中得竹簡漆書科斗文字雜寫經史與今本校驗多有異同耕人姓不不字呼作彪其名曰準出春秋後序文選中注出王內史書帖中有與蜀郡守朱不記名書求櫻桃來禽曰給藤子來禽言味甘來衆禽也俗作林檎又云胡桃種已成矣又問司馬相如揚子雲有後否蜀城門是司馬錯所製存乎盧元公鈞奉道暇日與賔友話言必及神仙之事云某有表弟韋卿材太和中選授江淮縣宰赴任出京日親朋相送離灞滻時已曛暮矣行一二十里外覺道路漸異非常日經過處既而望中有燈燭熒煌之狀林木蔥蒨似非人間頃之有謁於馬前者如州縣候吏問韋曰自何至此此非俗世俄頃復有一人至前謂謁者曰既至矣則須速報上公韋問曰上公何品秩也吏亦不對却走而去逡巡遞聲連呼曰上公屈韋下馬趨走入門則峻宇雕墻重廊復閣侍衛嚴肅擬於王侯見一人年僅四十戴平上幘衣素服遙謂韋曰上階韋拜而上命坐慰勞久之亦無肴酒湯果之設徐謂韋曰某因世亂百家相糾竄避於此推某為長強謂之上公爾來數百年無教令約束但任之自然而已公得至此塵俗之幸也不可久留當宜速去命取綃十匹贈之韋出門上馬却尋舊路回望亦無所見矣半夜朧月信馬而行至明則已在官路逆旅暫歇詢之於人且無能知者取綃視之光白可鑒韋遂驟却入關詣相國具述其事因以戔戔分遺親愛相國得綃亦裁製自服韋云約其處乃在驪山藍田之間蓋地仙也顧况字逋翁文詞之暇兼攻小筆嘗求知新亭監人或詰之謂曰余要寫貌海中山耳仍辟善畫者王默為副知也世言牡丹花近有蓋以國朝文士集中無牡丹歌詩張公嘗言楊子華有畫牡丹處極分明子華北齊人則知牡丹花亦已久矣又説顧況志尚疏逸近於方外有時宰曽招致將以好官命之況以詩答曰四海如今已太平相公何用喚狂生此身還似籠中鶴東望滄洲叫一聲後吳中皆言況得道解化去有黃金生者擢進士第人問與頗同房否對曰别洞黃本溪洞豪姓生故以此對人雖咍之亦賞其真實也王僧虔右軍之孫也齊髙帝嘗問曰卿書與我書孰優對曰臣書人臣第一陛下書帝王第一帝不悅後嘗以橛筆書恐為帝所忌故也陸暢字達夫常為韋南康作蜀道易首句曰蜀道易易於履平地南康大喜贈羅八百匹南康薨朝廷欲繩其既往之事復閲先所進兵器刻定秦二字不相與者因欲搆成罪名暢上疏理之云臣在蜀日見造所進兵器定秦者匠之名也由是得釋蜀道難李白罪嚴武也暢感韋之遇遂反其詞焉聖善寺銀佛天寶亂為賊截將一耳後少傅白公奉佛銀三鋌添補然不及舊者會昌拆寺命中貴人毁像收銀送內庫中人以白公所添鑄比舊耳少銀數十兩遂詣白公索餘銀恐涉隱沒故也又云士張林説毁寺時分遣御史檢天下所齊寺及收録金銀佛像有蘇監察者不記名巡覆兩街諸寺見銀佛一尺已下者多袖之而歸謂之蘇杠鳥講反佛或問溫庭筠將何對好遽曰無以過蜜陀僧也闕州謝真人上升前玉帝錫以鞍馬為信意者使其安心也刺史李堅遺之玉念珠後問念珠在否云已在紫皇之前矣一日真人於紫極宫置齋金母下降郡郭處處有虹霓雲氣之狀至白晝輕舉萬目覩焉魏受禪碑王朗文梁鵠書鍾繇鐫字謂之三絶鐫字皆須妙於篆籀故繇方得鐫刻張懷瓘書斷曰篆籀八分隸書草書章草飛白行書通謂之八體而右軍皆在神品右軍嘗醉書數字點畫類龍爪後遂有龍爪書如科斗玉筯偃波之類諸家共五十二般公云舒州灊山下有九井其實九眼泉也旱即殺一犬投其中大雨必降犬亦流出又南中久旱即以長繩繫虎頭骨投有龍處入水即數人牽制不定俄頃雲起潭中雨亦隨降龍虎敵也雖枯骨猶激動如此五星惡浮屠像今人家多圖畫五星雜於佛事中或謂之禳災者真不知也武后朝宰相石泉公王方慶琅琊王也武后嘗御武成殿閲書畫問方慶曰卿家舊法書存乎方慶遂集自右軍已下至僧虔智永禪師等二十五人各書一卷進上后命崔融作序謂為寶章集亦曰王氏世寶也今延英殿靈芝殿也謂之小延英苗韓公居相位以足疾步驟微蹇上每於此待之宰相對於小延英自此始也臺儀自大夫已下至監察通謂之五院御史國朝踐厯五院者共三人謂李商隱張魏公延賞溫僕射造也裴嶽者久應舉與長興于左揆友善曽有一古鏡子乃神物也于相布素時得一照分明見有朱衣吏導從他皆類此賔護與嶽微親面詰之云不虛旋亦墜失陳朝謝赫善畫嘗閲祕閣歎伏曹不興所畫龍首以為若見真龍陶貞白所著太清經一名劒經凡學道術者皆須有好劒鏡隨身又説干將莫耶劒皆以銅鑄非鐵也按隱居古今刀劒録云自古好刀劒多投伊水中以禳眯人之妖蓋伊水中有怪異似人膝脛已下至腳有首鼻口耳手足常損害人矣八分書起於漢時王次仲次仲有道詔徵聘於車中化為大鳥飛去墜三翮於地今有大翮山在常山郡界兵部李約員外嘗江行與一商胡舟楫相次商胡病固邀相見以二女託之皆絶色也又遺一珠約悉唯唯及商胡死財寶約數萬悉籍其數送官而以二女求配始殮商胡時約自以夜光含之人莫知也後死商胡有親屬來理資財約請官司發掘驗之夜光果在其密行皆此類也公云牧𢎞農日捕獲伐墓盜十餘輩中有一人請間言事公因屏吏獨問對曰某以他事贖死盧氏縣南山堯女冢近亦曽為人開發獲一大珠并玉碗人亦不能計其直餘寶器極多世莫之識也公因遣吏按驗即塜果有開處旋獲其盜考訊與前通無異及牽引其徒稱皆在商州冶務中時商牧名卿也州移牒公致書皆怒而不遣竊知者云珠玉之器皆入京師貴人家矣公前嵗自京徒步東出過盧氏復問邑中具如所説然史傳及地里志並不載此塜且堯女舜妃也皆死於湘嶺今所謂者豈傳説之誤歟矧貽訓於茅茨土階不宜有厚葬之事即此塜果何人哉飛白書始於蔡雍在鴻門見匠人施堊帚遂創意焉梁蕭子雲能之武帝謂曰蔡雍飛而不白羲之白而不飛飛白之間在斟酌耳嘗大書蕭字後人匣而寶之傳至張氏賔護東都舊第有蕭齋前後序引皆名公之詞也杜紫微頃於宰執求小儀不遂請小秋又不遂嘗夢人謂曰辭春不及秋昆腳與皆頭後果得比部員外又杜公自述不曽厯小比此必傳之誤楊祭酒敬之愛才公心嘗知江表之士項斯贈詩曰處處見詩詩總好及觀標格過於詩平生不解藏人善到處相逢説項斯因此名振遂登髙科也東都頃千創造防秋館穿掘多得蔡雍鴻都學所書石經後洛中人家往往有之王內史借船帖書之尤工者也故山北盧尚書匡寶惜有年公致書借之不得云只可就看未嘗借人也公除潞州旗節在途才數程忽有人將書帖就公求售閲之乃借船帖也公驚異問之云盧家郎君要錢遣賣耳公歎異移時不問其價還之後不知落於何人京師書儈孫盈者名甚著盈父曰仲容亦鑒書畫精於品目豪家所寶多經其手真偽無逃焉王公借船帖是孫盈所蓄人以厚價求之不果盧公其時急切減而賑之曰錢滿百千方得盧公韓太沖外孫也故書畫之尤者多閲而識之嘗有一淪落衣冠以先人執友方為邦伯因逺投謁冀有厚需及謁見即情極尋常所賚至寡歸無道路之費愁怨動容因間步長衢歎吒不已忽有一人衣服垢敝行過于前回目之曰公有不平之氣余願知之因具告情旨答曰止於要厚恤小事耳今夜可宿某舍暮往即已遲望門外遂延入謂之曰余隱者也見為縣獄卒要在濟人之急既夜分取一碗合于面前俄頃揭看見一班白紫綬者才長數寸此人詬責之曰與人有分不恤其孤可乎紫衣者遜謝久之復用碗覆於地更揭之則無有矣明日平旦聞傳聲覓某秀才甚急往則紫衣斂板以待情義頓濃遂贈數百縑亦不言其事豈非仙術乎佛經云佛教上屬鬼宿蓋神鬼之事鬼暗則佛教衰矣吳先生嘗稱有靈鬼録佛乃一靈鬼耳李抱真之鎮潞州也軍資匱缺計無所為有老僧大為郡人信服抱真因詣之謂曰假和尚之道以濟軍中可乎僧曰無不可抱真曰但言請於鞫場焚身某當於使宅鑿一地道通連候火作即潛以相出僧喜從之遂陳狀聲言抱真命於鞫場積薪貯油因為七日道場晝夜香燈梵唄雜作抱真亦引僧入地道使之不疑僧仍升座執爐對衆説法抱真率監軍僚屬及將吏膜拜其下以俸入檀施堆于其傍由是士女駢填捨財億計滿七日遂送柴積灌油發焰擊鐘念佛抱真密巳遣人填塞地道俄頃之際僧薪並灰數日藉所得貨財輦入軍資庫别求所謂舍利者數十粒造塔貯焉又説洛中頃年有僧得數粒所謂舍利者貯於琉璃器中晝夜香燈檀施之利日無虛焉有士子追於寒餒因請僧願得舍利掌而觀瞻僧遂出瓶授與遽即吞之僧惶駭如狂復慮聞之於外士子曰與吾幾錢當服藥出之僧喜聞遂贈二百緡仍取萬病丸與喫俄頃泄痢以盆盎盛貯濯而收之此一事東都儲隱説後即江表詩人路豹所為豹非茍於利者乃剛正之性以懲無良豹與張祐崔涯三人為文酒之侣也章仇兼瓊鎮蜀日佛寺設大會百戲在庭有十嵗童兒一作女童舞于竿杪忽有物狀如雕鶚掠之而去羣衆大駭因而罷樂後數日其父母見在髙塔之上梯而取之則神如癡久之方語云見如壁畫飛天夜叉者將入塔中日飼果實飲饌之味亦不知其所自旬日方精神如初晉書中有飲食名寒具者亦無注解處後於齊人要術并食經中檢得是今所謂􅠑餅桓玄嘗盛具法書名書請客觀之客有食寒具不濯手而執書畫因有涴玄不懌自是會客不設寒具昌黎生者名父子也雖教有義方而性頗暗劣嘗為集賢校理史傳中有説金根車處皆臆斷之曰豈其誤歟必金銀車悉改根字為銀字至除拾遺果為諫院不受俄有以故人子憫之者因辟為鹿門從事也今謂進士登第為遷鶯者久矣蓋自伐木詩伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木又曰嚶其鳴矣求其友聲並無鶯字頃嵗省試早鶯求友詩又鶯出谷詩别書固無證據豈非誤歟東晉謝太傅墓碑但樹貞石初無文字蓋重難製述之意也西平王始將禁軍在蜀戍蠻與張魏公不叶及西平功髙居相位德宗欲追魏公者數四慮西平不悅而罷後上令韓晉公善説然後並處中書一日因內宴禁中出瑞錦一匹令繫兩人一處以示和解之意潞州啓聖宫有明皇帝欹枕斜書壁處并腰鼓馬槽並在公為潞州從事皆見之千字文梁周興嗣編次而有王右軍書者人皆不曉其始乃梁武教諸王書令殷鐵石於大王書中拓一千字不重者每字片紙雜碎無序武帝召興嗣謂曰卿有才思為我韻之興嗣一夕編綴進上鬢髮皆白而賞賜甚厚右軍孫智永禪師自臨八百本散與人間諸寺各留一本永往住吳興永福寺積年學書禿筆頭十甕每甕皆數石人來覓書并請題頭者如市所居户限為之穿穴乃用鐵葉裹之人謂為鐵門限後取筆頭瘞之號為退筆塜自製銘志孫季雍著葬經又有著葬略者言葬用吉禮僧尼並不可令見之也鄭廣文學書而病無紙知慈恩寺有柿葉數間屋遂借僧房居止日取紅葉學書嵗久殆遍後自寫所製詩并畫同為一卷封進玄宗御筆書其尾曰鄭虔三絶郭侍郎承嘏嘗寶惜書法一卷每攜隨兵初應舉就雜文試寫畢夜色猶早以紙緘裹置於篋中及納所寶書帖却歸鋪於燭籠下取書帖觀覽則程試宛在篋中匆遽驚嗟計無所出來往於棘圍門外見一老吏詢其事具以實告吏曰某能換之然某家貧居興道里儻換得願以錢三萬見酬公悅而許之逡巡賫程試往而易書帖出授公公愧謝而退明日歸親仁里自以錢送諸興道欵關久之吏有家人出公以姓氏質之對曰主父死三日方貧未辦周身之具公驚嘆久之方知棘圍所見乃鬼也遂以錢贈其家而去余在京曽侍太傅相國盧公宴語親聞其事今又得於張公方審其異也云耳尚書故實
